name: Metrics

on:
  # Refresh once a day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Let you trigger it by hand from the Actions tab (needed for the first run)
  workflow_dispatch:

# The action commits the generated SVG back into the repo
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # A personal access token with `repo` scope so PRIVATE contributions
          # (askEric, FrameCoach, Salah Flow) count toward the numbers.
          token: ${{ secrets.METRICS_TOKEN }}
          user: MsTiik
          filename: github-metrics.svg
          config_timezone: Europe/London

          # No base card — drops the vanity block (name / join date / followers).
          base: ""

          # The "better thing": total lines of code shipped (added / removed),
          # aggregate only, so no private repo names ever appear in the image.
          plugin_lines: yes

          # Gold-on-ink theme to match the profile.
          extras_css: |
            svg { background: #1c1917 !important; color: #d6d3d1 !important; }
            h1, h2, .title { color: #f59e0b !important; }
            a, a:link, a:visited { color: #f59e0b !important; }
            .field svg, .octicon { fill: #f59e0b !important; }
