name: Metrics

on:
  # Refresh once a day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Let you trigger it by hand from the Actions tab (needed for the first run)
  workflow_dispatch:

# The action commits the generated SVG back into the repo
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # A personal access token with `repo` scope so PRIVATE contributions
          # (askEric, FrameCoach, Salah Flow) count toward the numbers.
          token: ${{ secrets.METRICS_TOKEN }}
          user: MsTiik
          filename: github-metrics.svg

          # Numbers only (stars / commits / PRs / issues / contributed-to).
          # Deliberately NOT `activity`/`repositories` so private repo names
          # never leak into the public SVG.
          base: header
          config_timezone: Europe/London

          # Optional upgrade — a 3D contribution heatmap that also counts your
          # private activity. Flip these to `yes` if you want it:
          # plugin_isocalendar: no
          # plugin_isocalendar_duration: full-year
