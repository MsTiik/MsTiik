name: Metrics

on:
  # Refresh once a day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Let you trigger it by hand from the Actions tab (needed for the first run)
  workflow_dispatch:

# The action commits the generated SVG back into the repo
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # A personal access token with `repo` scope so PRIVATE contributions
          # (askEric, FrameCoach, Salah Flow) count toward the calendar.
          token: ${{ secrets.METRICS_TOKEN }}
          user: MsTiik
          filename: github-metrics.svg
          config_timezone: Europe/London

          # No base card — drops the vanity block (name / join date / followers).
          base: ""

          # The "better thing": a full-year contribution calendar that counts
          # your PRIVATE work. Account-level aggregate, so no repo name ever
          # appears in the public image.
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Gold-on-ink theme. The :root vars + fill overrides recolour the
          # contribution cells from GitHub-green to a gold ramp.
          extras_css: |
            svg { background: #1c1917 !important; color: #d6d3d1 !important; }
            h1, h2, .title { color: #f59e0b !important; }
            a, a:link, a:visited { color: #f59e0b !important; }
            .field svg, .octicon { fill: #f59e0b !important; }
            :root {
              --color-calendar-graph-day-bg: #292524;
              --color-calendar-graph-day-L1-bg: #fde68a;
              --color-calendar-graph-day-L2-bg: #fbbf24;
              --color-calendar-graph-day-L3-bg: #f59e0b;
              --color-calendar-graph-day-L4-bg: #b45309;
            }
            [fill="#ebedf0"] { fill: #292524 !important; }
            [fill="#9be9a8"] { fill: #fde68a !important; }
            [fill="#40c463"] { fill: #fbbf24 !important; }
            [fill="#30a14e"] { fill: #f59e0b !important; }
            [fill="#216e39"] { fill: #b45309 !important; }
